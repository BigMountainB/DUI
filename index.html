<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>DUI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      position: fixed;
      touch-action: none;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #rotate-prompt {
      display: none;
      position: fixed; inset: 0;
      background: #000;
      color: #FFF;
      font-family: "Arial Black", Arial, sans-serif;
      text-align: center;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
      z-index: 9999;
      padding: 24px;
    }
    #rotate-prompt .icon { font-size: 64px; }
    #rotate-prompt .msg  { font-size: 22px; letter-spacing: 1px; }
    #rotate-prompt .sub  { font-size: 13px; color: #BBB; max-width: 280px; }
    @media screen and (orientation: portrait) and (max-width: 900px) {
      #rotate-prompt { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate-prompt">
    <div class="icon">📱↻</div>
    <div class="msg">ROTATE YOUR PHONE</div>
    <div class="sub">DUI is a landscape game. Turn your device sideways to play.</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
