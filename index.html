<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>DUI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      position: fixed;
      touch-action: none;
    }
    canvas { display: block; touch-action: none; }

    /* Phone-as-menu overlay — visible only in portrait.
       Anchored to ALL FOUR EDGES so iOS extends the container under
       both the status bar and the home indicator (with
       viewport-fit=cover above).  100dvh used to leave a ~50-px black
       strip below the dock when the home indicator's safe-area kicked
       in.  Inset:0 + min-height:100svh covers every iOS shell mode. */
    #phone-menu {
      display: none;
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      min-height: 100svh;
      background: #6CC8E8;
      z-index: 9999;
      touch-action: none;
      overflow: hidden;
    }
    #phone-menu img.bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      /* cover — image stretches top-to-bottom, slight horizontal
         crop possible.  Hit-zone math uses Math.max to match. */
      object-fit: cover;
      object-position: center;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /* Invisible interactive hit zones over the PNG art.  Toggle with
       `document.body.classList.add('debug')` to flash them red. */
    .phone-hit {
      position: absolute;
      background: transparent;
      border: 0;
      padding: 0;
      cursor: pointer;
      pointer-events: auto;
      border-radius: 18%;
    }
    body.debug [data-px] { background: rgba(255,0,0,0.20); border: 1px dashed red; }
    body.debug [data-px]::before {
      content: attr(data-action);
      position: absolute;
      top: 2px;
      left: 4px;
      font: 10px/1 monospace;
      color: #FFF;
      background: rgba(0,0,0,0.78);
      padding: 1px 4px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* Muted-music indicator — when the audio system is muted, a small
       🔇 badge appears in the centre of the music app tile.  Toggled
       via long-hold of the music app icon. */
    .phone-hit[data-action="music"].muted::after {
      content: '🔇';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 8vmin;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      pointer-events: none;
    }

    /* Selected steering ring — drawn as its own element so the visual
       outline locks to the icon artwork (data-ring-px) while the tap
       zone (data-px) stays generously padded.  Position is updated
       from JS on selection change + layout. */
    #phone-selection-ring {
      position: absolute;
      display: none;
      pointer-events: none;
      border-radius: 22%;
      /* 4px black stroke pushed 3 px outside the orange tile rim.
         outline + outline-offset follow border-radius on modern
         iOS Safari, so the stroke stays rounded. */
      outline: 4px solid #000000;
      outline-offset: 3px;
      /* z-index BELOW the modal overlays (z=2) so opening the Map /
         Garage / Music / Achievements modal cleanly covers the
         steering ring instead of punching it through on top. */
      z-index: 1;
    }

    /* Trophy + lock + hand chips — positioned via data-px (same
       PNG-pixel system as the other hit zones) so they track the
       artwork on every device.  Background transparent so the white
       tile from the PNG shows through; only the emoji renders. */
    #phone-trophy,
    #phone-lock,
    #phone-hand {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, "Segoe UI Emoji", "Apple Color Emoji", sans-serif;
      font-size: 13vmin;
      background: transparent;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: auto;
      border-radius: 18%;
    }
    #phone-lock        { color: #222; }
    #phone-lock.locked { color: #FF2244; }

    /* Party-time clock — sits at the bottom of the dark Calendar widget,
       overlaying the black area in WHITE so it reads cleanly on the
       black background. */
    #phone-clock {
      position: absolute;
      top: 42.5%;
      left: 58%;
      width: 34%;
      text-align: center;
      color: #FFFFFF;
      font-family: -apple-system, "Helvetica Neue", Helvetica, sans-serif;
      font-size: 4.8vmin;
      font-weight: 700;
      letter-spacing: 0.5px;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
      /* Nudge up 40 px + right 10 px so the time sits cleanly inside
         the dark band of the Calendar widget. */
      transform: translate(10px, -40px);
    }

    /* Garage modal — opens when the Garage tile is tapped.  Shows
       owned cars with their accessory loadout above each thumbnail. */
    #phone-garage {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15, 25, 40, 0.96);
      z-index: 2;
      flex-direction: column;
      padding: 6% 5% 5%;
      overflow-y: auto;
    }
    #phone-garage.open { display: flex; }
    #phone-garage .title {
      color: #FFEE00;
      font-family: "Impact", "Arial Black", sans-serif;
      font-size: 6vmin;
      text-align: center;
      margin-bottom: 2vmin;
    }
    #phone-garage .list { flex: 1; display: flex; flex-direction: column; gap: 2vmin; }
    #phone-garage .row {
      display: flex; align-items: center;
      background: #1E2C42;
      border: 2px solid #4A6E8C;
      border-radius: 8px;
      padding: 2vmin;
      cursor: pointer;
    }
    #phone-garage .row.current {
      border-color: #FFEE00;
      background: #1E5BB8;
    }
    #phone-garage .row .car-img {
      width: 22%;
      height: auto;
      max-height: 12vmin;
      object-fit: contain;
      margin-right: 3vmin;
    }
    #phone-garage .row .info { flex: 1; color: #FFF; font-family: "Helvetica Neue", sans-serif; }
    #phone-garage .row .name { font-size: 4vmin; font-weight: 700; }
    #phone-garage .row .stats { font-size: 2.6vmin; color: #AAD0FF; }
    #phone-garage .row .acc { font-size: 3.4vmin; margin-bottom: 0.5vmin; min-height: 4vmin; }
    #phone-garage .row .acc .badge { margin-right: 1vmin; }
    #phone-garage .close-btn {
      align-self: center;
      padding: 2vmin 6vmin;
      background: #FFFFFF;
      color: #1E5BB8;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: "Impact", sans-serif;
      font-size: 4vmin;
      cursor: pointer;
      margin-top: 2vmin;
    }

    /* Music app modal — Spotify-style genre → songs picker. */
    #phone-music {
      display: none;
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, #0E1620 0%, #1B2336 100%);
      z-index: 2;
      flex-direction: column;
      /* Pad the top by the iOS safe-area inset so the MUSIC title
         clears the Dynamic Island / notch on modern iPhones. */
      padding: calc(env(safe-area-inset-top, 0px) + 5vmin) 4% 4%;
      /* No overflow on the container — the inner body owns scrolling
         so the header + close button stay pinned. */
      overflow: hidden;
    }
    /* Body owns the scroll — title/controls stay at top, close button
       stays at bottom, the song list / genre grid scrolls inside. */
    #phone-music-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      /* Room at the bottom so the last row clears the floating
         CLOSE / BACK button. */
      padding-bottom: 14vmin;
    }
    #phone-music.open { display: flex; }
    #phone-music .title {
      color: #FFEE00;
      font-family: "Impact", "Arial Black", sans-serif;
      font-size: 6vmin;
      text-align: center;
      margin-bottom: 1vmin;
    }
    #phone-music .controls { display: flex; gap: 2vmin; margin: 1vmin 0 2vmin; justify-content: center; }
    #phone-music .controls button {
      background: #2A3C5C;
      color: #FFF;
      border: 1px solid #4A6E8C;
      border-radius: 6px;
      padding: 1.5vmin 3vmin;
      font-family: "Impact", sans-serif;
      font-size: 3.2vmin;
      cursor: pointer;
    }
    #phone-music .controls button.active { background: #1E5BB8; }
    #phone-music .genre-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2vmin;
    }
    #phone-music .genre {
      position: relative;
      padding: 4vmin 2vmin;
      border-radius: 8px;
      color: #FFF;
      font-family: "Impact", sans-serif;
      font-size: 4vmin;
      text-align: center;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.2);
    }
    #phone-music .genre.playing { border-color: #FFEE00; }
    /* Per-genre checkbox — top-right of each tile.  Toggles the
       whole station's tracks in/out of the playlist in one tap. */
    #phone-music .genre-check {
      position: absolute;
      top: 1.5vmin;
      right: 1.5vmin;
      width: 6.5vmin; height: 6.5vmin;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 6px;
      color: #FFEE00;
      font-size: 4vmin;
      cursor: pointer;
      padding: 0;
      font-family: -apple-system, "Segoe UI Emoji", sans-serif;
    }
    #phone-music .genre-check.checked { background: #1E5BB8; border-color: #FFEE00; }
    #phone-music .genre-check.partial { background: rgba(30,91,184,0.4); border-color: #FFEE00; }
    #phone-music .song-list {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 1.2vmin;
    }
    #phone-music .song {
      padding: 2vmin;
      border-radius: 6px;
      color: #FFF;
      background: #2A3C5C;
      cursor: pointer;
      font-family: "Helvetica Neue", sans-serif;
      font-size: 3.3vmin;
      display: flex; align-items: center;
    }
    #phone-music .song:hover { background: #3A4C6C; }
    #phone-music .song.playing {
      background: #1E5BB8;
      color: #FFEE00;
      box-shadow: inset 0 0 0 2px #FFEE00;
    }
    /* Pause button in the upper-right of the music modal — toggles
       the radio's pause state without leaving the modal. */
    #phone-music .pause-btn {
      position: absolute;
      top: calc(env(safe-area-inset-top, 0px) + 2vmin);
      right: 4vmin;
      width: 11vmin; height: 11vmin;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      border: 2px solid #FFEE00;
      border-radius: 8px;
      color: #FFFFFF;
      font-size: 6vmin;
      cursor: pointer;
      padding: 0;
      z-index: 4;
    }
    #phone-music .pause-btn.paused { background: rgba(255, 238, 0, 0.85); color: #000; }
    #phone-music .song .num {
      width: 6vmin; opacity: 0.6; font-variant-numeric: tabular-nums;
    }
    #phone-music .song .name { flex: 1; }
    #phone-music .song-check {
      width: 8vmin; height: 8vmin;
      display: flex; align-items: center; justify-content: center;
      background: transparent;
      border: 2px solid #88AACC;
      border-radius: 6px;
      color: #FFEE00;
      font-size: 4.5vmin;
      font-family: -apple-system, "Segoe UI Emoji", sans-serif;
      cursor: pointer;
      margin-right: 2vmin;
      flex-shrink: 0;
      padding: 0;
    }
    #phone-music .song-check.checked { background: #1E5BB8; border-color: #FFEE00; }
    /* Long-press drag — the row "lifts" while being dragged to a new
       position.  Pointer capture keeps the row tracking the finger. */
    #phone-music .song.dragging {
      background: #1E5BB8;
      border: 2px solid #FFEE00;
      box-shadow: 0 4px 14px rgba(0,0,0,0.55);
      z-index: 100;
      transition: none;
    }
    /* Up/down reorder arrows — only shown in the SELECTED view.
       Stacked vertically on the left edge of each song row. */
    #phone-music .reorder {
      display: flex; flex-direction: column;
      gap: 0.6vmin;
      margin-right: 2vmin;
    }
    #phone-music .reorder-btn {
      width: 7vmin; height: 4vmin;
      display: flex; align-items: center; justify-content: center;
      background: #2A3C5C;
      border: 1px solid #4A6E8C;
      border-radius: 4px;
      color: #FFEE00;
      font-size: 2.6vmin;
      cursor: pointer;
      padding: 0;
      font-family: -apple-system, "Segoe UI Emoji", sans-serif;
    }
    #phone-music .reorder-btn:disabled { opacity: 0.3; cursor: default; }
    /* Playlist bar — appears at the top of the music modal whenever
       the player has tracks selected in the playlist set. */
    #phone-music .playlist-bar {
      display: flex; gap: 2vmin; align-items: center;
      background: #2A3C5C;
      border: 1px solid #FFEE00;
      border-radius: 8px;
      padding: 2vmin;
      margin-bottom: 2vmin;
    }
    #phone-music .playlist-bar .count {
      flex: 1;
      color: #FFEE00;
      font-family: "Impact", sans-serif;
      font-size: 3.5vmin;
    }
    #phone-music .playlist-bar button {
      padding: 1.5vmin 3vmin;
      border: 1px solid #FFEE00;
      border-radius: 6px;
      background: #1E5BB8;
      color: #FFFFFF;
      font-family: "Impact", sans-serif;
      font-size: 3.2vmin;
      cursor: pointer;
    }
    #phone-music .playlist-bar button.clear { background: #CC2244; border-color: #FFCCDD; }
    #phone-music .back-btn {
      align-self: flex-start;
      padding: 1.5vmin 4vmin;
      background: #FFFFFF;
      color: #1E5BB8;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: "Impact", sans-serif;
      font-size: 3.4vmin;
      cursor: pointer;
      margin-bottom: 2vmin;
    }
    #phone-music .close-btn {
      align-self: center;
      padding: 2vmin 6vmin;
      background: #FFFFFF;
      color: #1E5BB8;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: "Impact", sans-serif;
      font-size: 4vmin;
      cursor: pointer;
      margin-top: 2vmin;
    }
    #phone-music .vol-row {
      display: flex;
      align-items: center;
      gap: 2vmin;
      padding: 1.5vmin 2vmin;
      margin-top: 1vmin;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    #phone-music .vol-row .lbl {
      color: #88CCFF;
      font-family: "Impact", sans-serif;
      font-size: 3.2vmin;
      min-width: 12vmin;
    }
    #phone-music .vol-row input[type="range"] {
      flex: 1;
      height: 4vmin;
      accent-color: #44CC88;
    }

    /* Steering-change confirmation — centered iOS-style alert.
       Mimics the system UIAlertController look (rounded translucent
       white card, blue button text, hairline divider). */
    #phone-confirm {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 5;
      align-items: center;
      justify-content: center;
      padding: 8vmin;
    }
    #phone-confirm.open { display: flex; }
    #phone-confirm .box {
      width: 78vmin;
      max-width: 90%;
      background: rgba(245, 245, 245, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      font-family: -apple-system, "Helvetica Neue", Helvetica, sans-serif;
    }
    #phone-confirm .msg {
      color: #000;
      text-align: center;
      font-size: 4.2vmin;
      line-height: 1.35;
      padding: 6vmin 5vmin 5vmin;
      font-weight: 500;
    }
    #phone-confirm .row {
      display: flex;
      border-top: 1px solid rgba(0,0,0,0.18);
    }
    #phone-confirm .row button {
      flex: 1;
      padding: 3.5vmin 0;
      border: 0;
      background: transparent;
      color: #007AFF;
      font-family: inherit;
      font-size: 4.5vmin;
      cursor: pointer;
    }
    #phone-confirm .row button + button {
      border-left: 1px solid rgba(0,0,0,0.18);
    }
    #phone-confirm .row .ok { font-weight: 600; }

    /* Vertical map modal — slides up when the player taps Maps icon. */
    #phone-map {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(15, 25, 40, 0.96);
      z-index: 2;
      flex-direction: column;
      padding: 6% 5% 5%;
    }
    #phone-map.open { display: flex; }
    #phone-map .title {
      color: #FFEE00;
      font-family: "Impact", "Arial Black", sans-serif;
      font-size: 6vmin;
      text-align: center;
      margin-bottom: 1vmin;
    }
    #phone-map .sub {
      color: #88CCFF;
      font-size: 3vmin;
      text-align: center;
      margin-bottom: 3vmin;
    }
    #phone-map svg { flex: 1; width: 100%; height: 100%; }
    #phone-map .close-btn {
      align-self: center;
      padding: 2vmin 6vmin;
      background: #FFFFFF;
      color: #1E5BB8;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: "Impact", sans-serif;
      font-size: 4vmin;
      cursor: pointer;
      margin-top: 2vmin;
    }

    @media (orientation: portrait) {
      #phone-menu { display: flex; }
    }
    /* Lock chip override — keep the menu visible regardless of
       orientation while the player has locked the phone. */
    body.menu-locked #phone-menu { display: flex !important; }

    /* Brief tap-through lock — after any modal closes, the iOS
       `click` event fires AFTER `pointerup` and would land on
       whichever .phone-hit hit zone is now uncovered (commonly
       START OVER below the music modal's CLOSE button).  Disabling
       .phone-hit pointer events for ~350 ms after modal close
       swallows that ghost click. */
    body.modal-closing .phone-hit { pointer-events: none; }

    /* CSS rotation fallback — iOS Safari's screen.orientation.lock()
       isn't reliable outside PWA standalone mode, so when the device
       physically rotates to landscape WHILE the menu is locked, we
       counter-rotate the menu 90° so it stays visually portrait. */
    @media (orientation: landscape) {
      body.phone-locked #phone-menu {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 100vh;
        height: 100vw;
        transform: translate(-50%, -50%) rotate(-90deg);
        transform-origin: center center;
      }
    }

    /* Achievements modal — opens when the trophy tile is tapped.
       Header stays fixed; the list scrolls independently; BACK button
       floats in the bottom-right corner. */
    #phone-achievements {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(10, 18, 32, 0.96);
      z-index: 2;
      flex-direction: column;
      /* Pad the top by the iOS safe-area inset so the TROPHIES title
         clears the Dynamic Island / notch on modern iPhones. */
      padding: calc(env(safe-area-inset-top, 0px) + 5vmin) 5% 5%;
    }
    #phone-achievements.open { display: flex; }
    #phone-achievements .title {
      color: #FFD700;
      font-family: "Impact", "Arial Black", sans-serif;
      font-size: 6vmin;
      text-align: center;
      margin-bottom: 1vmin;
      flex-shrink: 0;
    }
    #phone-achievements .sub {
      color: #88CCFF;
      font-size: 3vmin;
      text-align: center;
      margin-bottom: 3vmin;
      flex-shrink: 0;
    }
    #phone-achievements .list {
      flex: 1;
      display: flex; flex-direction: column;
      gap: 1.5vmin;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      /* The parent #phone-menu sets touch-action:none so the page
         doesn't pinch-zoom; we re-enable vertical pan inside the
         list so iOS lets the player scroll. */
      touch-action: pan-y;
      /* Leave room at the bottom so the last row isn't covered by
         the floating BACK button. */
      padding-bottom: 14vmin;
    }
    #phone-achievements .row {
      display: flex; align-items: center; gap: 2vmin;
      background: #1A2238;
      border: 2px solid #2E3F60;
      border-radius: 8px;
      padding: 2vmin;
      flex-shrink: 0;
    }
    #phone-achievements .row.earned { border-color: var(--tier-color, #FFD700); }
    #phone-achievements .row.locked { opacity: 0.5; }
    #phone-achievements .row .icon {
      font-size: 6vmin;
      width: 9vmin; height: 9vmin;
      display: flex; align-items: center; justify-content: center;
      background: #0E1828;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #phone-achievements .row .info { flex: 1; color: #FFF; font-family: "Helvetica Neue", sans-serif; }
    #phone-achievements .row .name { font-size: 3.6vmin; font-weight: 700; }
    #phone-achievements .row .desc { font-size: 2.6vmin; color: #AAD0FF; margin-top: 0.5vmin; }
    #phone-achievements .row .badge {
      font-size: 2.6vmin;
      font-weight: 700;
      padding: 0.5vmin 1.5vmin;
      border-radius: 999px;
      color: #000;
      background: var(--tier-color, #555);
      flex-shrink: 0;
    }
    #phone-achievements .close-btn {
      position: absolute;
      bottom: 4vmin;
      right: 4vmin;
      padding: 2vmin 5vmin;
      background: #FFFFFF;
      color: #1E5BB8;
      border: 2px solid #000;
      border-radius: 6px;
      font-family: "Impact", sans-serif;
      font-size: 4vmin;
      cursor: pointer;
      z-index: 3;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>
  <div id="phone-menu" aria-hidden="true">
    <img class="bg" src="assets/ui/iphone_menu_bg.png" alt="Phone menu" />

    <!-- White-box overlays: trophy (top-left blank box), lock (top-right
         blank box).  Positioned via data-px (PNG-pixel coords) so they
         track the artwork like the other hit zones.  Coords match the
         current 819×1536 iphone_menu_bg.png — the 2×2 white tile grid
         sits ~y=505 (top row) / ~y=680 (bottom row), with left column
         at x≈108 and right column at x≈275; each tile is ~120×120. -->
    <div id="phone-trophy" role="button" data-action="trophy" aria-label="Trophies"  data-px="108 505 120 120">🏆</div>
    <div id="phone-lock"   role="button" data-action="lock"   aria-label="Lock pause" data-px="275 505 120 120">🔓</div>
    <!-- Bottom-left empty white tile → right/left hand toggle.  Tap
         flips the HUD layout (weapon column edge, etc.). -->
    <div id="phone-hand"   role="button" data-action="hand"   aria-label="Handedness" data-px="108 680 120 120">✋</div>

    <!-- Steering-mode selection ring.  Drawn on top of the active
         steering icon; bounds are pulled from that button's
         data-ring-px (the artwork rect, not the padded tap rect). -->
    <div id="phone-selection-ring" aria-hidden="true"></div>

    <!-- Achievements modal — opens when the trophy tile is tapped. -->
    <div id="phone-achievements">
      <div class="title">TROPHIES</div>
      <div class="sub" id="phone-achievements-sub">— / —</div>
      <div class="list" id="phone-achievements-list"></div>
      <button class="close-btn" id="phone-achievements-close">BACK</button>
    </div>

    <!-- Steering-change confirmation — centered iOS-style alert. -->
    <div id="phone-confirm" aria-hidden="true">
      <div class="box">
        <div class="msg">Modifying your steering controls will end your current game.</div>
        <div class="row">
          <button class="cancel" id="phone-confirm-cancel">Cancel</button>
          <button class="ok"     id="phone-confirm-ok">Continue</button>
        </div>
      </div>
    </div>

    <!-- In-world party-time clock over the Calendar's lower black band. -->
    <div id="phone-clock">— : — PM</div>

    <!-- Hit zones — coordinates are PNG-PIXEL based, not viewport %.
         The script at the bottom reads the image's naturalWidth /
         naturalHeight, applies the object-fit:cover transform, and
         positions each zone in viewport px.  Zones auto-track the
         artwork on every device.  data-px = "x y w h" in PNG pixels. -->
    <button class="phone-hit" data-action="garage"     data-px="147 1450 567 537"></button>
    <button class="phone-hit" data-action="maps"       data-px="740 1478 212 194"></button>
    <button class="phone-hit" data-action="tilt"       data-px="1020 1471 207 196" data-ring-px="1041 1491 166 157"></button>
    <button class="phone-hit" data-action="lr"         data-px="744 1774 207 192" data-ring-px="765 1793 166 154"></button>
    <button class="phone-hit" data-action="tap"        data-px="1025 1766 201 206" data-ring-px="1045 1787 161 165"></button>
    <button class="phone-hit" data-action="music"      data-px="207 2317 208 196"></button>
    <button class="phone-hit" data-action="startover"  data-px="473 2317 205 197"></button>
    <button class="phone-hit" data-action="checkpoint" data-px="737 2317 210 197"></button>
    <button class="phone-hit" data-action="menu"       data-px="1000 2317 211 197"></button>

    <!-- Map modal — opens when Maps icon is tapped.  SVG content
         populated by JS below. -->
    <div id="phone-map">
      <div class="title">SEATTLE → PULLMAN</div>
      <div class="sub" id="phone-map-mile">Mile 0 / 293</div>
      <svg id="phone-map-svg" viewBox="0 0 100 200" preserveAspectRatio="xMidYMid meet"></svg>
      <button class="close-btn" id="phone-map-close">CLOSE</button>
    </div>

    <!-- Garage modal — opens when Garage tile is tapped.  Populated by JS. -->
    <div id="phone-garage">
      <div class="title">GARAGE</div>
      <div class="list" id="phone-garage-list"></div>
      <button class="close-btn" id="phone-garage-close">CLOSE</button>
    </div>

    <!-- Music app — Spotify-style picker; populated by JS. -->
    <div id="phone-music">
      <button id="phone-music-pause" class="pause-btn" aria-label="Pause music">⏸</button>
      <div class="title" id="phone-music-title">MUSIC</div>
      <div class="controls">
        <button id="phone-music-shuffle">🔀 SHUFFLE ALL</button>
        <button id="phone-music-shuffle-genre" style="display:none;">🔀 SHUFFLE GENRE</button>
      </div>
      <div id="phone-music-body"></div>
      <div class="vol-row">
        <span class="lbl">🔊 Volume</span>
        <input type="range" id="phone-music-vol" min="0" max="100" step="1" value="32" />
        <span id="phone-music-vol-pct" class="lbl" style="min-width:6vmin;text-align:right;">32%</span>
      </div>
      <button class="close-btn" id="phone-music-close">CLOSE</button>
    </div>
  </div>

  <script>
    (function () {
      // Append ?debug (or ?debug=1) to the URL to flash all hit zones —
      // useful for verifying icon alignment without iOS dev tools.
      if (/[?&]debug(=|&|$)/.test(location.search)) {
        document.body.classList.add('debug');
      }

      // ── Calibration mode ─────────────────────────────────────────────
      // Append ?calibrate to the URL.  Tap any spot on the menu and a
      // floating chip prints the PNG-pixel coordinate of that point.
      // Use it to map each icon's actual location in the artwork; send
      // me the four coords (top-left + size) per icon and I plug them
      // straight into data-px.  No dev tools needed.
      if (/[?&]calibrate(=|&|$)/.test(location.search)) {
        document.body.classList.add('debug');
        const chip = document.createElement('div');
        chip.style.cssText = 'position:fixed;top:6px;left:50%;transform:translateX(-50%);z-index:99999;background:rgba(0,0,0,0.85);color:#FFEE00;font:14px/1 monospace;padding:6px 10px;border-radius:6px;pointer-events:none;';
        chip.textContent = 'CALIBRATE: tap any icon';
        document.body.appendChild(chip);
        document.addEventListener('pointerdown', (e) => {
          const img = document.querySelector('#phone-menu img.bg');
          if (!img?.naturalWidth) return;
          const menu = document.getElementById('phone-menu');
          const rect = menu.getBoundingClientRect();
          const vw = menu.clientWidth, vh = menu.clientHeight;
          const scale = Math.max(vw / img.naturalWidth, vh / img.naturalHeight);
          const offX = (vw - img.naturalWidth * scale) / 2;
          const offY = (vh - img.naturalHeight * scale) / 2;
          const pngX = Math.round((e.clientX - rect.left - offX) / scale);
          const pngY = Math.round((e.clientY - rect.top  - offY) / scale);
          chip.textContent = `PNG: ${pngX}, ${pngY}`;
        }, { capture: true });
      }

      // ── Hit-zone auto-positioning ────────────────────────────────────
      // Hit zones are declared with data-px="x y w h" in PNG pixel
      // coordinates.  We compute the image's object-fit:cover scale
      // and offset against the live viewport, then translate every
      // zone to viewport-pixel position so alignment tracks the
      // artwork on every device (no per-aspect % retuning).
      const bgImg = document.querySelector('#phone-menu img.bg');
      let coverState = null;
      const recomputeCover = () => {
        if (!bgImg.naturalWidth || !bgImg.naturalHeight) return null;
        const imgW = bgImg.naturalWidth;
        const imgH = bgImg.naturalHeight;
        const menu = document.getElementById('phone-menu');
        const vw = menu.clientWidth;
        const vh = menu.clientHeight;
        // object-fit:cover scale = max ratio so image covers both dims.
        const scale = Math.max(vw / imgW, vh / imgH);
        const dispW = imgW * scale;
        const dispH = imgH * scale;
        const offX = (vw - dispW) / 2;
        const offY = (vh - dispH) / 2;
        coverState = { scale, offX, offY };
        return coverState;
      };
      const placePngBox = (el, pngStr) => {
        if (!coverState || !pngStr) return;
        const [px, py, pw, ph] = pngStr.split(/\s+/).map(Number);
        el.style.left   = (coverState.offX + px * coverState.scale) + 'px';
        el.style.top    = (coverState.offY + py * coverState.scale) + 'px';
        el.style.width  = (pw * coverState.scale) + 'px';
        el.style.height = (ph * coverState.scale) + 'px';
      };
      const layoutHitZones = () => {
        if (!recomputeCover()) return;
        // Position every element with data-px — hit zones + trophy +
        // lock + anything else we tag later.
        document.querySelectorAll('[data-px]').forEach(btn => placePngBox(btn, btn.dataset.px));
        // Re-position the selection ring (its source is whichever
        // steering button is currently .selected).
        positionSelectionRing();
      };
      // Move the steering ring onto the active steering button's
      // ring-rect, or hide it if nothing is selected.  Pulled out
      // so layout + applySteering can both call it.
      const positionSelectionRing = () => {
        const ring = document.getElementById('phone-selection-ring');
        if (!ring) return;
        const active = document.querySelector('.phone-hit.selected[data-ring-px]');
        if (!active) { ring.style.display = 'none'; return; }
        placePngBox(ring, active.dataset.ringPx);
        ring.style.display = 'block';
      };
      // Run on load, on resize, on orientation change.
      if (bgImg.complete) layoutHitZones();
      else bgImg.addEventListener('load', layoutHitZones);
      window.addEventListener('resize', layoutHitZones);
      window.addEventListener('orientationchange', () => requestAnimationFrame(layoutHitZones));
      // iOS Safari quirk — on cold launch the viewport reports the
      // wrong height for a few hundred ms while the status bar / safe
      // area settles.  Re-layout multiple times during the first
      // second so the PNG cover-fit + hit-zone positions match the
      // final viewport, not the transient cold-launch one.  Also
      // listen to visualViewport.resize which fires when iOS finally
      // commits to the real dimensions.
      const settleLayout = () => {
        // Force a reflow so cover-fit recomputes against current dims.
        void document.documentElement.offsetHeight;
        layoutHitZones();
      };
      window.addEventListener('load', () => {
        [50, 200, 500, 1000].forEach(ms => setTimeout(settleLayout, ms));
      });
      window.visualViewport?.addEventListener?.('resize', settleLayout);

      // Modal-close helper — call this whenever a modal is dismissed.
      // Briefly disables .phone-hit pointer events so the iOS-style
      // ghost click that fires after pointerup can't trigger the
      // hit-zone underneath the close button (e.g. closing the music
      // modal would otherwise drop a click on START OVER below it).
      const markModalClosing = () => {
        document.body.classList.add('modal-closing');
        setTimeout(() => document.body.classList.remove('modal-closing'), 350);
      };

      // ── Tap helper ────────────────────────────────────────────────────
      // iOS Safari occasionally drops the synthetic `click` event for
      // empty <button> elements inside touch-action: none containers.
      // Attaching `pointerup` AND `click` (with a 350 ms debounce) makes
      // every menu button work reliably on iPhone AND desktop.
      const addTap = (el, handler) => {
        if (!el) return;
        let last = 0;
        const wrap = (e) => {
          e.preventDefault(); e.stopPropagation();
          const now = Date.now();
          if (now - last < 350) return;
          last = now;
          handler(e);
        };
        el.addEventListener('pointerup', wrap, { passive: false });
        el.addEventListener('click',     wrap, { passive: false });
      };

      // Same idea as addTap but distinguishes a short tap from a
      // long-press.  pointerdown starts a 500ms timer; if pointerup
      // arrives before the timer fires, `onTap` runs.  If the timer
      // fires first, `onHold` runs and the subsequent pointerup is
      // swallowed so the tap handler doesn't also trigger.
      const addLongTap = (el, onTap, onHold, holdMs = 500) => {
        if (!el) return;
        let holdTimer = null;
        let holdFired = false;
        let lastFire  = 0;
        el.addEventListener('pointerdown', () => {
          holdFired = false;
          if (holdTimer) clearTimeout(holdTimer);
          holdTimer = setTimeout(() => {
            holdFired = true;
            holdTimer = null;
            if (onHold) onHold();
          }, holdMs);
        }, { passive: false });
        const endHold = (e) => {
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
          e.preventDefault(); e.stopPropagation();
          if (holdFired) { holdFired = false; return; }
          const now = Date.now();
          if (now - lastFire < 350) return;
          lastFire = now;
          if (onTap) onTap();
        };
        const cancel = () => {
          if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
          holdFired = false;
        };
        el.addEventListener('pointerup',     endHold, { passive: false });
        el.addEventListener('pointercancel', cancel);
        el.addEventListener('pointerleave',  cancel);
      };

      // ── Lock button ──────────────────────────────────────────────────
      const lockBtn = document.getElementById('phone-lock');
      const applyLock = () => {
        const locked = !!(window.__phoneLock?.get?.());
        lockBtn.classList.toggle('locked', locked);
        lockBtn.textContent = locked ? '🔒' : '🔓';
        lockBtn.setAttribute('aria-pressed', String(locked));
        // Keep the portrait menu visible even in landscape while
        // locked — body class overrides the orientation media query.
        document.body.classList.toggle('menu-locked', locked);
      };
      addTap(lockBtn, () => {
        const cur = !!(window.__phoneLock?.get?.());
        window.__phoneLock?.set?.(!cur);
        applyLock();
      });

      // ── Handedness toggle ────────────────────────────────────────────
      // 👈 = left-handed (default, weapons on left edge);
      // 👉 = right-handed (weapons on right edge).
      const handBtn = document.getElementById('phone-hand');
      const applyHand = () => {
        const h = window.__handedness?.get?.() ?? 'left';
        handBtn.textContent = (h === 'left') ? '👈' : '👉';
        handBtn.setAttribute('aria-pressed', h === 'right' ? 'true' : 'false');
      };
      addTap(handBtn, () => {
        window.__handedness?.toggle?.();
        applyHand();
      });

      // ── Steering selection highlight ──────────────────────────────────
      // 'flappy' (tap), 'tilt', 'classic' (L/R) — map to the matching
      // .phone-hit.  The gameplay code calls the two-thumb mode
      // "classic"; keeping "lr" here made the phone UI disagree with
      // the scene/save mode names.
      const STEER_BUTTONS = { tap: 'flappy', tilt: 'tilt', lr: 'classic' };
      const applySteering = () => {
        // Defensive sweep — wipe any stale .selected from EVERY hit
        // zone first, then apply only to the active steering button.
        // Prevents leftover state on Maps / Music / etc. from showing
        // the black stroke.
        document.querySelectorAll('.phone-hit.selected').forEach(b => b.classList.remove('selected'));
        const cur = window.__steeringMode?.get?.() ?? 'flappy';
        for (const [el, mode] of Object.entries(STEER_BUTTONS)) {
          if (cur !== mode) continue;
          const btn = document.querySelector(`.phone-hit[data-action="${el}"]`);
          if (btn) btn.classList.add('selected');
        }
        // Move the visual ring onto the now-selected button's
        // artwork rect (data-ring-px), independent of its tap zone.
        positionSelectionRing();
      };
      // pointerup (not click) — iOS Safari sometimes drops synthetic
      // click events on empty <button> elements inside touch-action:
      // none containers.  pointerup fires reliably for both mouse +
      // touch.  Guard against double-firing if a desktop click also
      // arrives by checking a recent-fire timestamp.
      let _lastSteerFire = 0;
      // Promise wrapper around the centered confirm modal.  Resolves
      // true on Continue, false on Cancel.  Listeners are attached per
      // call and removed on close so the handler can't double-fire.
      const confirmModal  = document.getElementById('phone-confirm');
      const confirmMsg    = confirmModal?.querySelector('.msg');
      const confirmOk     = document.getElementById('phone-confirm-ok');
      const confirmCancel = document.getElementById('phone-confirm-cancel');
      const showConfirm = (message) => new Promise(resolve => {
        if (confirmMsg && message) confirmMsg.textContent = message;
        const close = (val) => {
          confirmModal.classList.remove('open');
          // Suppress the iOS ghost click — without this, pressing
          // Continue on the Start Over confirm would also fire the
          // Tilt Steer (or whichever) button underneath where the
          // Continue button was.
          markModalClosing();
          confirmOk.removeEventListener('pointerup', okHandler);
          confirmOk.removeEventListener('click',     okHandler);
          confirmCancel.removeEventListener('pointerup', cancelHandler);
          confirmCancel.removeEventListener('click',     cancelHandler);
          resolve(val);
        };
        const okHandler     = (e) => { e.preventDefault(); e.stopPropagation(); close(true);  };
        const cancelHandler = (e) => { e.preventDefault(); e.stopPropagation(); close(false); };
        confirmOk.addEventListener('pointerup', okHandler,     { passive: false });
        confirmOk.addEventListener('click',     okHandler,     { passive: false });
        confirmCancel.addEventListener('pointerup', cancelHandler, { passive: false });
        confirmCancel.addEventListener('click',     cancelHandler, { passive: false });
        confirmModal.classList.add('open');
      });
      const handleSteerSelect = (btn) => async (e) => {
        e.preventDefault(); e.stopPropagation();
        const now = Date.now();
        if (now - _lastSteerFire < 350) return;
        _lastSteerFire = now;
        const mode = STEER_BUTTONS[btn.dataset.action];
        const current = window.__steeringMode?.get?.() ?? 'flappy';
        // No-op if tapping the already-selected non-tilt mode.  Tilt is
        // allowed to run again because the registry can say "tilt" even
        // when the orientation listener did not attach.
        if (current === mode && mode !== 'tilt') return;
        if (mode === 'tilt') {
          window.__phaserGame?.registry?.set?.('titleThumbsPick', 'tilt');
        }
        // Centered iOS-style confirmation — set() will restart the
        // Game scene, ending the active run.
        const ok = await showConfirm('Modifying your steering controls will end your current game.');
        if (!ok) {
          if (mode === 'tilt') {
            window.__phaserGame?.registry?.set?.('titleThumbsPick', current);
          }
          return;
        }
        // Update the visual FIRST — directly mark the clicked
        // button.  Doesn't depend on the game-side get()
        // returning the new value (scene.restart inside set()
        // can interfere with that read on iOS).
        document.querySelectorAll('.phone-hit.selected').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        positionSelectionRing();
        // Then push to the game.
        window.__steeringMode?.set?.(mode);
      };
      document.querySelectorAll('.phone-hit[data-action="tap"], .phone-hit[data-action="tilt"], .phone-hit[data-action="lr"]')
        .forEach(btn => {
          const h = handleSteerSelect(btn);
          btn.addEventListener('pointerup', h, { passive: false });
          btn.addEventListener('click',     h, { passive: false });
        });

      // ── In-world party-time clock over the Calendar ───────────────────
      // The Phaser side ticks _partyClockSec (real-time countdown).  Map
      // the elapsed fraction to 2 PM → 8 PM (6-hour span).
      const clockEl = document.getElementById('phone-clock');
      const formatPhoneTime = () => {
        const game = window.__phaserGame;
        const scene = game?.scene?.getScene?.('Game');
        if (!scene) return '— : — PM';
        const total = scene._partyClockTotalSec || (scene._partyClockSec ? null : null);
        const remain = scene._partyClockSec ?? 0;
        const partyTotal = total
          ?? (typeof scene._partyClockSecMax !== 'undefined' ? scene._partyClockSecMax : 40 * 60);
        // Find difficulty's total — fall back to detection from remain at start.
        // 2:00 PM = 14:00.  8:00 PM = 20:00.  6h span = 360 min.
        const elapsedFrac = Math.max(0, Math.min(1.5, 1 - (remain / partyTotal)));
        const totalMin = elapsedFrac * 360;
        const hour24   = 14 + Math.floor(totalMin / 60);
        const min      = Math.floor(totalMin % 60);
        const ampm     = (hour24 % 24) >= 12 ? 'PM' : 'AM';
        const hour12   = ((hour24 % 12) === 0) ? 12 : (hour24 % 12);
        const mm       = String(min).padStart(2, '0');
        return `${hour12}:${mm} ${ampm}`;
      };
      const tickClock = () => {
        clockEl.textContent = formatPhoneTime();
        // Sync the 🔇 badge on the music tile with whatever the game
        // currently thinks audio.muted is, so the in-game pause-menu
        // mute and the long-press mute stay visually linked.
        if (typeof applyMusicMutedIndicator === 'function') applyMusicMutedIndicator();
      };
      setInterval(tickClock, 1000);

      // ── Map modal ─────────────────────────────────────────────────────
      const mapModal   = document.getElementById('phone-map');
      const mapSvg     = document.getElementById('phone-map-svg');
      const mapMile    = document.getElementById('phone-map-mile');
      const mapClose   = document.getElementById('phone-map-close');
      // I-90 → WA-26 → US-195 → WA-270 waypoints (mile, lat, lon).
      const WAYPOINTS = [
        [  0, 47.580, -122.390],
        [  5, 47.598, -122.330],
        [9.5, 47.570, -122.222],
        [12.5,47.611, -122.180],
        [ 18, 47.530, -122.033],
        [ 25, 47.528, -121.825],
        [ 32, 47.493, -121.789],
        [ 53, 47.424, -121.413],
        [ 70, 47.243, -121.187],
        [ 84, 47.196, -120.937],
        [101, 47.071, -120.661],
        [109, 46.995, -120.547],
        [137, 46.948, -119.978],
        [158, 46.904, -119.629],
        [184, 46.826, -119.176],
        [228, 46.755, -118.310],
        [253, 46.810, -117.873],
        [274, 46.877, -117.364],
        [289, 46.731, -117.180],
      ];
      const STOPS = [
        { mile:   5, name: 'Seattle' },
        { mile:  18, name: 'Issaquah' },
        { mile:  32, name: 'North Bend' },
        { mile:  53, name: 'Snoqualmie Pass' },
        { mile:  84, name: 'Cle Elum' },
        { mile: 109, name: 'Ellensburg' },
        { mile: 137, name: 'Vantage' },
        { mile: 184, name: 'Othello' },
        { mile: 253, name: 'La Crosse' },
        { mile: 274, name: 'Colfax' },
        { mile: 289, name: 'Pullman' },
      ];
      // Pre-compute fit bounds for the svg viewBox.
      let mapBounds = null;
      const fitMap = () => {
        const pts = WAYPOINTS.map(([m, lat, lon]) => [lon, -lat]);
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const [x, y] of pts) {
          if (x < minX) minX = x;  if (x > maxX) maxX = x;
          if (y < minY) minY = y;  if (y > maxY) maxY = y;
        }
        mapBounds = { minX, maxX, minY, maxY, w: maxX - minX, h: maxY - minY };
      };
      fitMap();
      const project = (lat, lon) => {
        // svg viewBox is 100×200 (portrait).  Pad 8 inside.
        const padX = 8, padY = 12;
        const innerW = 100 - padX * 2;
        const innerH = 200 - padY * 2;
        const s = Math.min(innerW / mapBounds.w, innerH / mapBounds.h);
        const cx = (mapBounds.minX + mapBounds.maxX) / 2;
        const cy = (mapBounds.minY + mapBounds.maxY) / 2;
        const x = 50 + (lon - cx) * s;
        const y = 100 + (-lat - cy) * s;
        return [x, y];
      };
      const milePoint = (m) => {
        // Linear interp between waypoint pairs.
        for (let i = 0; i < WAYPOINTS.length - 1; i++) {
          const [m0, la0, lo0] = WAYPOINTS[i];
          const [m1, la1, lo1] = WAYPOINTS[i+1];
          if (m >= m0 && m <= m1) {
            const t = (m - m0) / Math.max(0.001, m1 - m0);
            return project(la0 + (la1 - la0) * t, lo0 + (lo1 - lo0) * t);
          }
        }
        return project(...WAYPOINTS[WAYPOINTS.length - 1].slice(1));
      };
      const renderMap = () => {
        // Build the polyline + rest stop dots + player dot.
        const pathPts = [];
        for (let i = 0; i < WAYPOINTS.length - 1; i++) {
          const [m0, la0, lo0] = WAYPOINTS[i];
          const [m1, la1, lo1] = WAYPOINTS[i+1];
          const span = m1 - m0;
          const steps = Math.max(1, Math.ceil(span / 5));
          for (let k = 0; k <= steps; k++) {
            const t = k / steps;
            pathPts.push(project(la0 + (la1 - la0) * t, lo0 + (lo1 - lo0) * t));
          }
        }
        const d = pathPts.map(([x, y], i) => (i ? 'L' : 'M') + x.toFixed(2) + ' ' + y.toFixed(2)).join(' ');
        const mileNow = ((window.__phaserGame?.scene?.getScene?.('Game')?._odometer) ?? 0);
        const [px, py] = milePoint(mileNow);
        const stopsSvg = STOPS.map(s => {
          const [sx, sy] = milePoint(s.mile);
          return `<circle cx="${sx}" cy="${sy}" r="1.4" fill="#FFE066" stroke="#000" stroke-width="0.4"/>
                  <text x="${sx + 2.5}" y="${sy + 1.4}" font-size="2.6" fill="#FFFFFF" font-family="Helvetica">${s.name}</text>`;
        }).join('');
        mapSvg.innerHTML = `
          <path d="${d}" fill="none" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
          ${stopsSvg}
          <circle cx="${px}" cy="${py}" r="3" fill="#FF2244" stroke="#FFF" stroke-width="0.8">
            <animate attributeName="r" values="3;4.2;3" dur="1s" repeatCount="indefinite"/>
          </circle>
        `;
        mapMile.textContent = `Mile ${Math.round(mileNow)} / 293`;
      };
      const openMap = () => { mapModal.classList.add('open'); renderMap(); };
      const closeMap = () => { mapModal.classList.remove('open'); markModalClosing(); };
      addTap(mapClose, closeMap);
      addTap(document.querySelector('.phone-hit[data-action="maps"]'), openMap);
      // While the modal is open, re-render the player dot every 2 s so
      // the dot tracks live mileage if the game is mid-pause.
      setInterval(() => { if (mapModal.classList.contains('open')) renderMap(); }, 2000);

      // ── Garage modal ──────────────────────────────────────────────────
      const garageModal = document.getElementById('phone-garage');
      const garageList  = document.getElementById('phone-garage-list');
      const garageClose = document.getElementById('phone-garage-close');
      const renderGarage = () => {
        const cars = window.__garage?.list?.() ?? [];
        garageList.innerHTML = cars.map(c => {
          const accLabels = [];
          if (c.accessories.bumper)   accLabels.push('<span class="badge">🛡 Bumper</span>');
          if (c.accessories.nos > 0)  accLabels.push(`<span class="badge">⚡ NOS L${c.accessories.nos}</span>`);
          if (c.accessories.traction) accLabels.push('<span class="badge">❄️ Traction</span>');
          const accRow = accLabels.length ? accLabels.join('') : '<span style="color:#557;">— no accessories —</span>';
          const imgHtml = c.imageUrl
            ? `<img class="car-img" src="${c.imageUrl}" alt="${c.label}" onerror="this.style.display='none'"/>`
            : `<div class="car-img" style="background:#${(c.tint).toString(16).padStart(6,'0')}; width:22%; height:8vmin; border-radius:4px;"></div>`;
          return `<div class="row ${c.current ? 'current' : ''}" data-id="${c.id}">
            <div style="display:flex; flex-direction:column; align-items:center; width:30%;">
              <div class="acc">${accRow}</div>
              ${imgHtml}
            </div>
            <div class="info">
              <div class="name">${c.label}${c.current ? ' ★' : ''}</div>
              <div class="stats">${c.hp} HP · ${c.rangeMi} mi · ${c.topMph} mph · ${c.drive} · ${c.fuel}</div>
            </div>
          </div>`;
        }).join('');
        garageList.querySelectorAll('.row').forEach(row => {
          row.addEventListener('click', (e) => {
            e.preventDefault(); e.stopPropagation();
            const id = row.dataset.id;
            window.__garage?.select?.(id);
            renderGarage();   // re-paint with new "current"
          });
        });
      };
      const openGarage  = () => { renderGarage(); garageModal.classList.add('open'); };
      const closeGarage = () => { garageModal.classList.remove('open'); markModalClosing(); };
      addTap(garageClose, closeGarage);
      addTap(document.querySelector('.phone-hit[data-action="garage"]'), openGarage);

      // ── Checkpoint hit zone — warps to last-reached rest stop ─────────
      addTap(document.querySelector('.phone-hit[data-action="checkpoint"]'), () => {
        const ok = window.__checkpoint?.warpToLast?.();
        if (!ok) {
          // Visual feedback when there is no checkpoint to warp to.
          const btn = document.querySelector('.phone-hit[data-action="checkpoint"]');
          if (btn) {
            btn.classList.add('selected');
            setTimeout(() => btn.classList.remove('selected'), 600);
          }
        }
      });

      // ── Start Over hit zone — restart the run from mile 0 with the
      //    same vehicle.  Confirmation popup first so the player can't
      //    accidentally lose progress.  Game stays paused in portrait;
      //    rotating to landscape arms tap-to-resume the fresh run.
      addTap(document.querySelector('.phone-hit[data-action="startover"]'), async () => {
        const ok = await showConfirm('Are you sure you want to start over?  Your current run will be lost.');
        if (!ok) return;
        window.__startOver?.();
      });

      // ── Music app modal ───────────────────────────────────────────────
      const musicModal     = document.getElementById('phone-music');
      const musicTitle     = document.getElementById('phone-music-title');
      const musicBody      = document.getElementById('phone-music-body');
      const musicShuffle   = document.getElementById('phone-music-shuffle');
      const musicShuffleG  = document.getElementById('phone-music-shuffle-genre');
      const musicClose     = document.getElementById('phone-music-close');
      let musicGenreIdx = null;        // null = list view; integer = song view

      const prettyTrack = (url) => {
        // 'assets/music/country/blue_lights.mp3' → 'Blue Lights'
        const f = url.split('/').pop().replace(/\.mp3$/i, '');
        return f.replace(/[_-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      };
      // Cross-genre playlist — ORDERED array of selected track URLs.
      // Pre-filled with EVERY track across every station the first
      // time the music app opens.  Order matters for the Selected
      // view's reorder controls and the PLAY button (plays in
      // playlist order).  `playlistHas` / Add / Remove keep the API
      // close to the old Set so the rest of the renderer didn't
      // change much.
      const playlist = [];
      const playlistHas    = (url) => playlist.indexOf(url) !== -1;
      const playlistAdd    = (url) => { if (!playlistHas(url)) playlist.push(url); };
      const playlistRemove = (url) => { const i = playlist.indexOf(url); if (i !== -1) playlist.splice(i, 1); };
      const playlistMove   = (url, dir) => {
        const i = playlist.indexOf(url);
        if (i === -1) return;
        const j = i + dir;
        if (j < 0 || j >= playlist.length) return;
        [playlist[i], playlist[j]] = [playlist[j], playlist[i]];
      };
      let _playlistInitialized = false;
      const ensurePlaylistDefaults = () => {
        if (_playlistInitialized) return;
        const stations = window.__music?.list?.() ?? [];
        if (!stations.length) return;            // music API not ready yet
        for (const s of stations) for (const t of (s.tracks ?? [])) playlistAdd(t);
        _playlistInitialized = true;
      };
      // View mode — 'main' (genre grid / song list) or 'selected'
      // (flat ordered list of the playlist with reorder arrows).
      let musicView = 'main';
      const renderMusic = () => {
        const stations = window.__music?.list?.() ?? [];
        // If the audio system hasn't registered with the Phaser registry
        // yet (cold-load race between BootScene boot + the player
        // opening the music app), show a loading message and re-render
        // shortly.  After 3 seconds of failed polls we offer a manual
        // retry button — covers the case where Phaser boot stalled
        // (failed module fetch, 404'd asset, etc.) and never finishes.
        if (!stations.length) {
          renderMusic._loadingSince = renderMusic._loadingSince || Date.now();
          const stuckMs = Date.now() - renderMusic._loadingSince;
          musicTitle.textContent = 'MUSIC';
          musicShuffle.style.display    = 'none';
          musicShuffleG.style.display   = 'none';
          musicClose.textContent        = 'CLOSE';
          musicBody.className = '';
          if (stuckMs > 3000) {
            musicBody.innerHTML = `
              <div style="color:#88A; text-align:center; padding:8vmin; font-family:Helvetica;">
                <div style="margin-bottom:3vmin;">Music is taking longer than usual to load.</div>
                <button id="phone-music-retry" style="padding:2vmin 5vmin; background:#FFFFFF; color:#1E5BB8; border:2px solid #000; border-radius:6px; font-family:Impact,sans-serif; font-size:4vmin; cursor:pointer;">RETRY</button>
              </div>`;
            const retryBtn = musicBody.querySelector('#phone-music-retry');
            if (retryBtn) addTap(retryBtn, () => {
              window.__music?.warmup?.();
              renderMusic._loadingSince = 0;
              renderMusic();
            });
          } else {
            musicBody.innerHTML = `<div style="color:#88A; text-align:center; padding:8vmin; font-family:Helvetica;">Loading songs…</div>`;
          }
          clearTimeout(renderMusic._retryTimer);
          renderMusic._retryTimer = setTimeout(() => {
            if (musicModal.classList.contains('open')) renderMusic();
          }, 250);
          return;
        }
        // Audio is ready — clear the "stuck since" marker so future
        // empty renders (which shouldn't happen) get fresh treatment.
        renderMusic._loadingSince = 0;
        const cur      = window.__music?.current?.();
        // Lazy first-open population of the cross-genre playlist set.
        ensurePlaylistDefaults();
        // Bottom button reads CLOSE on the genre grid, BACK in a song
        // list OR the selected view (both pop one level up to the
        // genre grid).
        musicClose.textContent = (musicGenreIdx == null && musicView !== 'selected')
          ? 'CLOSE'
          : 'BACK';
        // Visible scope — Play / Clear only operate on songs the
        // player can currently see.
        let visibleTracks;
        if (musicView === 'selected') {
          visibleTracks = playlist.slice();
        } else if (musicGenreIdx == null) {
          visibleTracks = stations.flatMap(s => s.tracks ?? []);
        } else {
          visibleTracks = stations[musicGenreIdx]?.tracks ?? [];
        }
        const visibleSelected = visibleTracks.filter(t => playlistHas(t));
        // Playlist bar — always shown when there's at least one
        // selection.  Adds a VIEW toggle so the player can flip to a
        // flat ordered list of just their selected songs.
        const plCount = visibleSelected.length;
        const viewLbl = (musicView === 'selected') ? 'GENRES' : 'SELECTED';
        const playlistBar = (plCount > 0 || musicView === 'selected')
          ? `<div class="playlist-bar">
               <div class="count">▶ Playlist: ${playlist.length} song${playlist.length === 1 ? '' : 's'}</div>
               <button id="phone-music-pl-view">${viewLbl}</button>
               <button id="phone-music-pl-play">PLAY</button>
               <button id="phone-music-pl-clear" class="clear">CLEAR</button>
             </div>`
          : '';
        if (musicView === 'selected') {
          // Flat ordered list of selected songs with reorder + remove.
          musicTitle.textContent = 'PLAYLIST';
          musicShuffle.style.display = 'none';
          musicShuffleG.style.display = 'none';
          const tracks = playlist.slice();
          const trackRows = tracks.length
            ? `<div class="song-list">` + tracks.map((url, i) => {
                const stIdx = stations.findIndex(s => (s.tracks ?? []).includes(url));
                const stName = stIdx !== -1 ? (stations[stIdx]?.name ?? '') : '';
                return `<div class="song" data-url="${url}">
                  <div class="reorder">
                    <button class="reorder-btn up"   data-url="${url}" aria-label="Move up"   ${i === 0 ? 'disabled' : ''}>▲</button>
                    <button class="reorder-btn down" data-url="${url}" aria-label="Move down" ${i === tracks.length - 1 ? 'disabled' : ''}>▼</button>
                  </div>
                  <span class="num">${i + 1}</span>
                  <span class="name">${prettyTrack(url)}${stName ? ` <span style="opacity:0.55;font-size:2.4vmin;">· ${stName}</span>` : ''}</span>
                  <button class="song-check checked" data-url="${url}" aria-label="Remove from playlist">✓</button>
                </div>`;
              }).join('') + `</div>`
            : `<div style="color:#88A; text-align:center; padding:6vmin;">No songs in the playlist.  Tap GENRES to add some.</div>`;
          musicBody.className = '';
          musicBody.innerHTML = playlistBar + trackRows;
          musicBody.querySelectorAll('.song').forEach(row => {
            const url = row.dataset.url;
            // Tap the name area → play this track.
            const nameEl = row.querySelector('.name');
            if (nameEl) addTap(nameEl, () => {
              window.__music?.playTrack?.(url);
              renderMusic();
            });
            // Up / down arrows reorder within the playlist.
            const up   = row.querySelector('.reorder-btn.up');
            const down = row.querySelector('.reorder-btn.down');
            if (up   && !up.disabled)   addTap(up,   () => { playlistMove(url, -1); renderMusic(); });
            if (down && !down.disabled) addTap(down, () => { playlistMove(url, +1); renderMusic(); });
            // Checkbox in selected view = "remove from playlist".
            const cb = row.querySelector('.song-check');
            if (cb) addTap(cb, () => { playlistRemove(url); renderMusic(); });

            // Long-press drag-to-reorder.  500ms hold without moving
            // > 8 px arms drag mode; while dragging the row follows
            // the finger Y, swapping with whichever sibling it
            // overlaps.  Pointerup commits + re-renders.
            let holdTimer = null;
            let dragging  = false;
            let startY    = 0;
            let baselineY = 0;
            let lastDragEnd = 0;
            const cancelHold = () => {
              if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
            };
            // Eat the click that iOS fires AFTER pointerup whenever
            // a drag just finished, so the song-name's addTap doesn't
            // play the (now-relocated) song.
            row.addEventListener('click', (e) => {
              if (Date.now() - lastDragEnd < 350) {
                e.stopPropagation();
                e.preventDefault();
              }
            }, { capture: true });
            row.addEventListener('pointerdown', (e) => {
              // Skip ONLY the buttons that need their own short-tap
              // handlers (up/down arrows + checkbox).  The song name
              // is the main grab-handle for the long-press drag, so
              // it's included here.  If the user releases under 500
              // ms, no drag starts and the name's addTap can still
              // fire to play the track.
              if (e.target.closest('.reorder-btn') || e.target.closest('.song-check')) return;
              startY    = e.clientY;
              baselineY = e.clientY;
              holdTimer = setTimeout(() => {
                dragging = true;
                row.classList.add('dragging');
                // Once drag is active, take the gesture away from
                // iOS native pan-y scroll so pointermove fires into
                // our handler instead of becoming list scroll.
                row.style.touchAction = 'none';
                try { row.setPointerCapture?.(e.pointerId); } catch (_) {}
              }, 500);
            }, { passive: false });
            row.addEventListener('pointermove', (e) => {
              // Cancel pending long-press if the user starts moving
              // before the 500ms tick.
              if (!dragging) {
                if (Math.abs(e.clientY - startY) > 8) cancelHold();
                return;
              }
              e.preventDefault();
              const delta = e.clientY - baselineY;
              row.style.transform = `translateY(${delta}px)`;
              // Find any sibling whose vertical centre is now under
              // the dragged row's centre — swap them in playlist + DOM.
              const myRect = row.getBoundingClientRect();
              const myMid  = myRect.top + myRect.height / 2;
              const siblings = [...row.parentElement.querySelectorAll('.song:not(.dragging)')];
              for (const sib of siblings) {
                const sRect = sib.getBoundingClientRect();
                if (myMid > sRect.top && myMid < sRect.bottom) {
                  const myIdx  = playlist.indexOf(url);
                  const sibUrl = sib.dataset.url;
                  const sibIdx = playlist.indexOf(sibUrl);
                  if (myIdx === -1 || sibIdx === -1) break;
                  // Swap in the playlist array.
                  [playlist[myIdx], playlist[sibIdx]] = [playlist[sibIdx], playlist[myIdx]];
                  // Move in DOM so visual order matches; reset
                  // baseline so transform stays anchored to the new
                  // resting position.
                  if (sibIdx > myIdx) sib.after(row);
                  else                sib.before(row);
                  const newRect = row.getBoundingClientRect();
                  baselineY = e.clientY - (newRect.top - sRect.top);
                  row.style.transform = `translateY(${e.clientY - baselineY}px)`;
                  break;
                }
              }
            }, { passive: false });
            const finishDrag = (e) => {
              cancelHold();
              if (!dragging) return;
              // Eat the pointerup so the song-name's addTap doesn't
              // also fire (which would play the track AND re-render,
              // wiping the dragged row mid-finish).
              if (e) {
                try { e.stopPropagation(); } catch (_) {}
                try { e.preventDefault();  } catch (_) {}
              }
              dragging = false;
              row.classList.remove('dragging');
              row.style.transform = '';
              // Restore native list scrolling on this row.
              row.style.touchAction = '';
              lastDragEnd = Date.now();
              renderMusic();
            };
            // Capture-phase so the row's pointerup runs BEFORE the
            // name's bubble-phase addTap and can stopPropagation when
            // a drag is finishing.
            row.addEventListener('pointerup',     finishDrag, { capture: true, passive: false });
            row.addEventListener('pointercancel', finishDrag, { capture: true });
          });
        } else if (musicGenreIdx == null) {
          // Genre grid view
          musicTitle.textContent = 'MUSIC';
          musicShuffle.style.display = '';
          musicShuffleG.style.display = 'none';
          musicBody.className = '';
          musicBody.innerHTML = playlistBar + `<div class="genre-grid">` + stations.map((s) => {
            const tracks      = s.tracks ?? [];
            const tracksCount = tracks.length;
            const playing     = cur && cur.index === s.index;
            const checkedCnt  = tracks.reduce((n, t) => n + (playlistHas(t) ? 1 : 0), 0);
            const allChecked  = tracksCount > 0 && checkedCnt === tracksCount;
            const someChecked = checkedCnt > 0 && !allChecked;
            const checkGlyph  = allChecked ? '✓' : (someChecked ? '–' : '');
            const checkClass  = allChecked ? 'checked' : (someChecked ? 'partial' : '');
            return `<div class="genre ${playing ? 'playing' : ''}" data-idx="${s.index}" style="background:${s.color};">
              <button class="genre-check ${checkClass}" data-idx="${s.index}" aria-label="Toggle ${s.name} songs">${checkGlyph}</button>
              ${s.name}<br/><span style="font-size:2.6vmin; opacity:0.85;">${tracksCount} song${tracksCount === 1 ? '' : 's'}</span>
            </div>`;
          }).join('') + `</div>`;
          musicBody.querySelectorAll('.genre').forEach(el => {
            addTap(el, () => {
              musicGenreIdx = parseInt(el.dataset.idx, 10);
              renderMusic();
            });
            const cb = el.querySelector('.genre-check');
            if (cb) addTap(cb, () => {
              const idx = parseInt(cb.dataset.idx, 10);
              const st  = stations[idx];
              const ts  = st?.tracks ?? [];
              if (!ts.length) return;
              const allIn = ts.every(t => playlistHas(t));
              if (allIn) ts.forEach(t => playlistRemove(t));
              else       ts.forEach(t => playlistAdd(t));
              renderMusic();
            });
          });
        } else {
          // Song list view for selected genre
          const st = stations[musicGenreIdx];
          musicTitle.textContent = st?.name ?? 'MUSIC';
          musicShuffle.style.display = 'none';
          musicShuffleG.style.display = (st?.tracks?.length ?? 0) > 1 ? '' : 'none';
          const tracks = st?.tracks ?? [];
          const backRow = `<button class="back-btn" id="phone-music-back">← GENRES</button>`;
          const playingUrl = window.__music?.nowPlayingUrl?.() ?? '';
          const trackRows = tracks.length
            ? `<div class="song-list">` + tracks.map((url, i) => {
                const checked = playlistHas(url);
                const isPlaying = playingUrl && playingUrl.endsWith(url);
                return `<div class="song${isPlaying ? ' playing' : ''}" data-url="${url}">
                  <button class="song-check ${checked ? 'checked' : ''}" data-url="${url}" aria-label="Add to playlist">${checked ? '✓' : ''}</button>
                  <span class="num">${i + 1}</span>
                  <span class="name">${prettyTrack(url)}</span>
                </div>`;
              }).join('') + `</div>`
            : `<div style="color:#88A; text-align:center; padding:6vmin;">This station is procedural — no individual tracks.</div>`;
          musicBody.className = '';
          musicBody.innerHTML = playlistBar + backRow + trackRows;
          addTap(musicBody.querySelector('#phone-music-back'), () => {
            musicGenreIdx = null;
            renderMusic();
          });
          musicBody.querySelectorAll('.song').forEach(row => {
            addTap(row, () => {
              window.__music?.playTrack?.(row.dataset.url);
              renderMusic();
            });
            const cb = row.querySelector('.song-check');
            if (cb) addTap(cb, () => {
              const url = cb.dataset.url;
              if (playlistHas(url)) playlistRemove(url);
              else                  playlistAdd(url);
              renderMusic();
            });
          });
        }
        // Playlist-bar buttons — wired after every render since the
        // HTML is rebuilt.  Both Play / Clear operate on visible
        // scope; View flips between main + selected modes.
        const plView  = musicBody.querySelector('#phone-music-pl-view');
        const plPlay  = musicBody.querySelector('#phone-music-pl-play');
        const plClear = musicBody.querySelector('#phone-music-pl-clear');
        if (plView)  addTap(plView, () => {
          musicView = (musicView === 'selected') ? 'main' : 'selected';
          renderMusic();
        });
        if (plPlay)  addTap(plPlay, () => {
          if (!visibleSelected.length) return;
          window.__music?.playPlaylist?.(visibleSelected);
        });
        if (plClear) addTap(plClear, () => {
          for (const t of visibleTracks) playlistRemove(t);
          renderMusic();
        });
      };
      // Music-modal pause button — toggles audio.paused via the
      // bridge.  Visual state updates from the audio system every
      // render so it stays in sync if pause comes from somewhere else.
      const musicPauseBtn = document.getElementById('phone-music-pause');
      const applyMusicPauseBtn = () => {
        const paused = !!window.__music?.isPaused?.();
        musicPauseBtn?.classList.toggle('paused', paused);
        if (musicPauseBtn) musicPauseBtn.textContent = paused ? '▶' : '⏸';
      };
      if (musicPauseBtn) {
        addTap(musicPauseBtn, () => {
          window.__music?.togglePaused?.();
          applyMusicPauseBtn();
        });
      }

      // Volume slider — drives audio.volume directly through __music.
      // Initialised once when the music modal first opens (when the
      // game-side audio is sure to exist).
      const volSlider = document.getElementById('phone-music-vol');
      const volPct    = document.getElementById('phone-music-vol-pct');
      const syncVolFromGame = () => {
        const v = window.__music?.getVolume?.() ?? 0.32;
        const pct = Math.round(v * 100);
        if (volSlider) volSlider.value = String(pct);
        if (volPct)    volPct.textContent = `${pct}%`;
      };
      const applyVolFromSlider = () => {
        const pct = parseInt(volSlider?.value ?? '32', 10) || 0;
        window.__music?.setVolume?.(pct / 100);
        if (volPct) volPct.textContent = `${pct}%`;
      };
      if (volSlider) {
        volSlider.addEventListener('input',  applyVolFromSlider, { passive: true });
        volSlider.addEventListener('change', applyVolFromSlider, { passive: true });
      }

      addTap(musicShuffle, () => {
        window.__music?.shuffleAll?.();
        renderMusic();
      });
      addTap(musicShuffleG, () => {
        if (musicGenreIdx != null) window.__music?.playStation?.(musicGenreIdx);
        renderMusic();
      });
      // Bottom button behavior — CLOSE on the genre grid (closes the
      // whole music app, returns to the iPhone menu); BACK on the
      // song-list view (returns to the genre grid).
      addTap(musicClose, () => {
        // SELECTED view → BACK to the genre grid.
        if (musicView === 'selected') {
          musicView = 'main';
          musicGenreIdx = null;
          renderMusic();
          return;
        }
        // SONG list view → BACK to the genre grid.
        if (musicGenreIdx != null) {
          musicGenreIdx = null;
          renderMusic();
          return;
        }
        // GENRE grid view → CLOSE the music app.
        musicModal.classList.remove('open');
        releaseWakeLock();
        markModalClosing();
      });
      // Music app — short tap opens the modal; long-hold toggles mute
      // without opening anything.  Visual indicator added below.
      const musicHit = document.querySelector('.phone-hit[data-action="music"]');
      const applyMusicMutedIndicator = () => {
        const muted = !!window.__music?.isMuted?.();
        musicHit?.classList.toggle('muted', muted);
      };
      // Screen wake lock — prevents iOS from sleeping the screen
      // while the music modal is up.  When the screen sleeps, iOS
      // suspends the AudioContext and the track silently dies a few
      // seconds later (the "song crashes after ~30s" report).
      let _wakeLock = null;
      const requestWakeLock = async () => {
        try {
          if ('wakeLock' in navigator) {
            _wakeLock = await navigator.wakeLock.request('screen');
            _wakeLock.addEventListener?.('release', () => { _wakeLock = null; });
          }
        } catch (_) { /* unsupported / denied — silently fall through */ }
      };
      const releaseWakeLock = () => {
        try { _wakeLock?.release?.(); } catch (_) {}
        _wakeLock = null;
      };
      // Re-acquire the lock when the document becomes visible again
      // (iOS auto-releases on tab switch).
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible' && musicModal.classList.contains('open')) {
          requestWakeLock();
        }
      });
      // When the player rotates to landscape, fully close the music
      // modal — its state (wake lock, lingering pointer captures
      // from a half-finished long-press, etc.) can otherwise block
      // taps on the game canvas.  The song keeps playing; the modal
      // just hides cleanly instead of staying "open" but invisible.
      const closeMusicForGameplay = () => {
        if (!musicModal.classList.contains('open')) return;     // nothing to clean up
        musicModal.classList.remove('open');
        releaseWakeLock();
        // Reset any in-progress drag visuals on song rows so the
        // next portrait open starts clean.
        musicBody.querySelectorAll('.song.dragging').forEach(r => {
          r.classList.remove('dragging');
          r.style.transform = '';
          r.style.touchAction = '';
        });
        // Belt-and-suspenders for iOS: if a song row had pointer
        // capture during a scroll/tap near the bottom of the list,
        // dropping the class alone may leave the just-finished gesture
        // in a weird target state.  Rebuilding clears transient row
        // listeners/capture targets while preserving playlist state.
        musicBody.innerHTML = '';
      };
      const onMusicOrientationChange = () => {
        const attempt = () => {
          if (window.innerHeight > window.innerWidth) return;   // still portrait
          closeMusicForGameplay();
        };
        // iOS reports old dimensions for the first orientation event
        // surprisingly often, so try again after layout settles.
        requestAnimationFrame(attempt);
        setTimeout(attempt, 80);
        setTimeout(attempt, 250);
      };
      window.addEventListener('resize',            onMusicOrientationChange);
      window.addEventListener('orientationchange', onMusicOrientationChange);

      addLongTap(musicHit, () => {
        // tap → open music modal
        musicGenreIdx = null;
        musicModal.classList.add('open');
        renderMusic();
        syncVolFromGame();
        applyMusicPauseBtn();
        requestWakeLock();
        // Build the AudioContext + node graph NOW (using the user
        // gesture that just opened the modal) so the first song tap
        // only has to wait on the MP3 download, not the synth setup.
        window.__music?.warmup?.();
      }, () => {
        // long-hold → toggle mute
        window.__music?.toggleMute?.();
        applyMusicMutedIndicator();
      });

      // ── Achievements modal ───────────────────────────────────────────
      const achModal = document.getElementById('phone-achievements');
      const achList  = document.getElementById('phone-achievements-list');
      const achSub   = document.getElementById('phone-achievements-sub');
      const achClose = document.getElementById('phone-achievements-close');
      const TIER_COLORS = { bronze: '#CD7F32', silver: '#C0C0C0', gold: '#FFD700' };
      const renderAchievements = () => {
        const data = window.__achievements?.list?.() ?? null;
        if (!data) {
          achList.innerHTML = `<div style="color:#88A; text-align:center; padding:6vmin;">Achievements load after the first game starts.</div>`;
          achSub.textContent = '0 / 0 unlocked';
          return;
        }
        const total  = data.length;
        const earned = data.filter(a => a.tier).length;
        achSub.textContent = `${earned} / ${total} unlocked`;
        achList.innerHTML = data.map(a => {
          const tier = a.tier;
          const tierColor = tier ? TIER_COLORS[tier] : '#FFD700';
          const rowClass  = tier ? 'earned' : 'locked';
          const badge     = tier
            ? `<div class="badge" style="--tier-color:${tierColor}">${tier.toUpperCase()}</div>`
            : '';
          return `<div class="row ${rowClass}" style="--tier-color:${tierColor}">
            <div class="icon">${a.icon || '🏆'}</div>
            <div class="info">
              <div class="name">${a.label}</div>
              <div class="desc">${a.desc || ''}</div>
            </div>
            ${badge}
          </div>`;
        }).join('');
      };
      addTap(achClose, () => { achModal.classList.remove('open'); markModalClosing(); });
      addTap(document.querySelector('.phone-hit[data-action="trophy"]'), () => {
        renderAchievements();
        achModal.classList.add('open');
      });
      addTap(document.getElementById('phone-trophy'), () => {
        renderAchievements();
        achModal.classList.add('open');
      });

      // ── Boot — pull initial state from the Phaser game once it wires
      //    up the globals.  Retry every 100 ms until __phoneLock exists. -
      const bootTimer = setInterval(() => {
        if (window.__phoneLock) {
          applyLock();
          applySteering();
          if (window.__handedness) applyHand();
          if (window.__music) applyMusicMutedIndicator();
          clearInterval(bootTimer);
        }
      }, 100);
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
